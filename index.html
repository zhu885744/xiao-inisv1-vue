<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>%VITE_TITLE%</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      #loadingPage {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #f8f9fa 0%, #f1f5f9 100%);
        font-size: 12px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5em;
        transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #loadingPage.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: scale(0.96);
      }
      /* 3D 容器优化 */
      .base {
        height: 10em;
        width: 10em;
        transform: rotateX(45deg) rotateZ(45deg);
        transform-style: preserve-3d;
        position: relative;
      }
      /* 立方体基础样式 */
      .cube,
      .cube:after,
      .cube:before {
        content: '';
        position: absolute;
        height: 3.2em;
        width: 3.2em;
        border-radius: 0.4em;
        backface-visibility: hidden;
      }
      .cube {
        float: left;
        background-color: #07d870;
        position: relative;
        transform: translateZ(3.2em);
        transform-style: preserve-3d;
        box-shadow: 0 0 1.8em rgba(7, 216, 112, 0.25);
        animation: cubeFloat 1.4s infinite ease-in-out;
        transition: all 0.2s ease;
      }
      /* 立方体右侧面 */
      .cube:after {
        background-color: #06c465;
        transform: rotateX(-90deg) translateY(3.2em);
        transform-origin: bottom right;
        box-shadow: inset -0.2em 0.2em 0.4em rgba(0,0,0,0.1);
      }
      /* 立方体顶侧面 */
      .cube:before {
        background-color: #049e4f;
        transform: rotateY(90deg) translateX(3.2em);
        transform-origin: bottom right;
        box-shadow: inset 0.2em 0 0.4em rgba(0,0,0,0.15);
      }
      /* 错落动画延迟 - 更自然的波浪效果 */
      .cube:nth-child(1) { animation-delay: 0s; }
      .cube:nth-child(2) { animation-delay: 0.12s; }
      .cube:nth-child(3) { animation-delay: 0.24s; }
      .cube:nth-child(4) { animation-delay: 0.12s; }
      .cube:nth-child(5) { animation-delay: 0.24s; }
      .cube:nth-child(6) { animation-delay: 0.36s; }
      .cube:nth-child(7) { animation-delay: 0.24s; }
      .cube:nth-child(8) { animation-delay: 0.36s; }
      .cube:nth-child(9) { animation-delay: 0.48s; }
      /* 核心浮动动画 - 更柔和、更有弹性 */
      @keyframes cubeFloat {
        0% { transform: translateZ(3.2em) scale(1); }
        50% { transform: translateZ(0.6em) scale(0.92); }
        100% { transform: translateZ(3.2em) scale(1); }
      }
      /* 加载文字样式 */
      .loading-tip {
        font-size: 1.5em;
        color: #05b960;
        font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
        letter-spacing: 0.25em;
        font-weight: 500;
        animation: tipPulse 1.8s infinite ease-in-out;
        text-shadow: 0 0 0.8em rgba(7, 216, 112, 0.2);
      }
      /* 文字呼吸动画，替代闪烁，更高级 */
      @keyframes tipPulse {
        0% { opacity: 0.7; transform: scale(0.98); }
        50% { opacity: 1; transform: scale(1); }
        100% { opacity: 0.7; transform: scale(0.98); }
      }
      /* 响应式 */
      @media (max-width: 375px) {
        #loadingPage { font-size: 10px; }
      }
      @media (min-width: 768px) {
        #loadingPage { font-size: 15px; }
      }
      /* 性能优化 */
      .base, .cube {
        will-change: transform;
        transform-style: preserve-3d;
      }
    </style>
</head>
<body>
    <div id="loadingPage">
      <div class='base'>
        <div class='cube'></div><div class='cube'></div><div class='cube'></div>
        <div class='cube'></div><div class='cube'></div><div class='cube'></div>
        <div class='cube'></div><div class='cube'></div><div class='cube'></div>
      </div>
      <div class="loading-tip">页面加载中...</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>

    <script>
      // 配置检测脚本
      const checkConfigStatus = async () => {
        try {
          let configExists = false
          try {
            const response = await fetch('/config/app.toml')
            if (response.ok) {
              const contentType = response.headers.get('content-type')
              const content = await response.text()
              configExists = content.trim() !== '' && 
                           (content.includes('title =') || content.includes('api_uri =')) &&
                           !content.includes('<!DOCTYPE html>') &&
                           !content.includes('<html')
            }
          } catch (error) {
            configExists = false
          }
          
          localStorage.removeItem('themeConfig')
          document.cookie = 'THEME_CONFIG=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;'
          
          let configSource = '默认配置'
          if (configExists) {
            configSource = '配置文件 (app.toml)'
          }
          
          console.log('=== 配置文件状态 ===')
          console.log('配置文件是否存在:', configExists)
          console.log('当前使用的配置来源:', configSource)
          console.log('================')
        } catch (error) {
          console.error('检测配置状态失败:', error)
        }
      }
      
      const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      
      if (!isDev) {
        checkConfigStatus()
      } else {
        console.log('开发环境：跳过配置文件检测')
      }
      
      // 加载页面处理
      const loadingPage = document.getElementById('loadingPage')
      const hideLoading = () => {
        if (loadingPage.classList.contains('hidden')) return
        loadingPage.classList.add('hidden')
        setTimeout(() => {
          loadingPage.remove()
        }, 600)
      }
      window.onload = hideLoading
      setTimeout(hideLoading, 3500)
    </script>
</body>
</html>
